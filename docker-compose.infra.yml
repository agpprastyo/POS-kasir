services:
  postgres:
    image: postgres:15-alpine
    container_name: pos-postgres
    restart: always
    environment:
      POSTGRES_USER: ${DB_USER:-pos_user}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-pos_password}
      POSTGRES_DB: ${DB_NAME:-pos_kasir}
    ports:
      - "${DB_PORT:-5432}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - pos-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-pos_user} -d ${DB_NAME:-pos_kasir}"]
      interval: 5s
      timeout: 5s
      retries: 5

  minio:
    image: minio/minio:latest
    container_name: pos-minio
    restart: always
    environment:
      MINIO_ROOT_USER: ${R2_ACCESS_KEY:-minioadmin}
      MINIO_ROOT_PASSWORD: ${R2_SECRET_KEY:-minioadmin}
    command: server /data --console-address ":9001"
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - minio_data:/data
    networks:
      - pos-network

  redis:
    image: redis:7-alpine
    container_name: pos-redis
    restart: always
    ports:
      - "6379:6379"
    networks:
      - pos-network
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
  minio_data:

networks:
  pos-network:
    driver: bridge
