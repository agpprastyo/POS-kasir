services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: pos-kasir
    env_file:
      - .env
    ports:
      - "${APP_PORT:-8080}:8080"
    networks:
      - pos-network
    restart: always
    deploy:
      resources:
        limits:
          cpus: '0.50'
          memory: 512M

networks:
  pos-network:
    driver: bridge
